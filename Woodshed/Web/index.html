<!DOCTYPE html>
<!--
  index.html — the offline notation surface.

  This page is loaded into a WKWebView from the app bundle (no network). It hosts
  OpenSheetMusicDisplay (the vendored opensheetmusicdisplay.min.js sitting next to
  this file) and exposes a tiny JS API that Swift calls via evaluateJavaScript:

      window.loadScoreB64(base64Xml)  -> render a score
      window.cursorNext()             -> advance the follow-cursor
      window.cursorReset()            -> move the cursor back to the start

  Swift owns the data model and the clock; this page only draws and moves a cursor.
  Status/errors are posted back to Swift through the "osmd" message handler.
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body { margin: 0; padding: 0; background: #ffffff; height: 100%; }
    /* A real scroll viewport: the follow-cursor scrolls this, and you can also scroll
       it by hand (wheel/trackpad/touch) to review bars you've already played. */
    #scrollHost { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #osmdContainer { width: 100%; }
    #err { color: #b00; font-family: -apple-system, monospace; padding: 12px; white-space: pre-wrap; }
  </style>
  <script src="opensheetmusicdisplay.min.js"></script>
</head>
<body>
  <div id="err"></div>
  <div id="scrollHost"><div id="osmdContainer"></div></div>
  <script>
    function post(msg) {
      try { window.webkit.messageHandlers.osmd.postMessage(msg); } catch (e) {}
    }

    var osmd = null;
    if (typeof opensheetmusicdisplay === "undefined") {
      post("error: OSMD script not loaded");
    } else {
      try {
        osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay("osmdContainer", {
          autoResize: false,   // we own resize (below) so anchors rebuild after every relayout
          backend: "svg",
          drawTitle: true,
          drawingParameters: "default"
        });
      } catch (e) {
        post("error: OSMD init failed — " + e);
      }
    }

    // Decode a base64 (UTF-8) payload into a JS string. atob() yields a binary
    // string (one byte per char); the escape/decodeURIComponent dance turns those
    // bytes back into proper UTF-8 text so accented titles etc. survive.
    function b64ToUtf8(b64) {
      return decodeURIComponent(escape(window.atob(b64)));
    }

    var pendingRender = false;
    var lastRenderWidth = 0;   // width the score was last laid out at (detect real resizes)

    // Render only when the container actually has width. In a WKWebView the view
    // can start at 0×0 and get its real size a beat later; rendering at width 0
    // produces an invisible score (the "white box"). So if width is 0 we wait for
    // a ResizeObserver to report a real width, then render exactly once.
    function renderWhenSized() {
      var c = document.getElementById("osmdContainer");
      if (c.clientWidth > 0) {
        osmd.render();
        if (osmd.cursor) { osmd.cursor.show(); }
        buildAnchors();
        if (handColors) { recolorAndRerender(); }   // reapply hand colours after a fresh load
        refreshSelection();
        pendingRender = false;
        lastRenderWidth = c.clientWidth;
        post("loaded svg=" + c.querySelectorAll("svg").length + " containerW=" + c.clientWidth);
      } else {
        pendingRender = true;
        post("waiting for width (containerW=0)…");
      }
    }

    // When the pane is resized (e.g. collapsing the sidebar), OSMD must relayout to
    // the new width AND we must rebuild the cursor anchor table — otherwise the cursor
    // keeps using stale pixel positions and drifts off the played note. Debounced so a
    // drag-resize only re-renders once it settles. Colours/marks are preserved (no
    // applyNoteColors); the next cursor tick re-syncs position + follow-scroll.
    function relayoutIfResized() {
      var c = document.getElementById("osmdContainer");
      var w = c ? c.clientWidth : 0;
      if (w <= 0 || !osmd || !osmd.graphic) return;   // ignore collapse-to-zero / no score yet
      if (Math.abs(w - lastRenderWidth) < 1) return;   // width unchanged
      lastRenderWidth = w;
      // Re-run the bars-per-line fit at the new width (colours/marks preserved).
      fitToRequestedBars(true);
    }
    var resizeTimer = null;
    var ro = new ResizeObserver(function () {
      if (pendingRender) { renderWhenSized(); return; }
      if (resizeTimer) { clearTimeout(resizeTimer); }
      resizeTimer = setTimeout(relayoutIfResized, 120);
    });
    ro.observe(document.getElementById("osmdContainer"));

    window.loadScoreB64 = function (b64) {
      document.getElementById("err").textContent = "";
      post("received b64len=" + (b64 ? b64.length : 0));
      if (!osmd) { post("error: OSMD not initialized"); return; }
      var xml;
      try { xml = b64ToUtf8(b64); }
      catch (e) { post("error: base64 decode failed"); return; }
      post("decoded xmlChars=" + xml.length);
      osmd.load(xml).then(function () {
        renderWhenSized();
      }).catch(function (e) {
        document.getElementById("err").textContent = "OSMD error: " + e;
        post("error: load — " + e);
      });
    };

    // Anchor table: for every cursor stop, its notated beat and pixel position.
    // Built once per render; used to interpolate a smooth cursor between notes.
    var anchors = [];
    function buildAnchors() {
      var el = osmd.cursor && osmd.cursor.cursorElement;
      if (!el) return;
      osmd.cursor.reset();
      anchors = [];
      var guard = 0;
      while (!osmd.cursor.iterator.endReached && guard < 100000) {
        anchors.push({ b: osmd.cursor.iterator.currentTimeStamp.RealValue * 4,
                       left: el.offsetLeft, top: el.offsetTop });
        osmd.cursor.next(); guard++;
      }
      osmd.cursor.reset();
      osmd.cursor.show();
    }

    // Position the cursor at a (possibly fractional) notated beat. Interpolates the
    // horizontal position within a system for fluid motion; snaps across line breaks
    // (where the stop's vertical position changes).
    window.cursorSeekBeat = function (cb) {
      var A = anchors, el = osmd.cursor && osmd.cursor.cursorElement;
      if (!A.length || !el) return;
      var i = 0;
      while (i + 1 < A.length && A[i + 1].b <= cb) i++;
      var x = A[i].left, top = A[i].top;
      if (i + 1 < A.length && A[i + 1].top === A[i].top) {
        var span = A[i + 1].b - A[i].b;
        var f = span > 0 ? (cb - A[i].b) / span : 0;
        if (f < 0) f = 0; else if (f > 1) f = 1;
        x = A[i].left + f * (A[i + 1].left - A[i].left);
      }
      el.style.left = x + "px";
      el.style.top = top + "px";
      followScroll(top);
    };

    // Follow-scroll: keep the active system near the top so the current line and the
    // next line stay in view. We scroll the #scrollHost viewport (rather than a CSS
    // transform) so the user can ALSO scroll it by hand to review already-played bars
    // — the transform hid everything above the cursor with no way back. Only updates
    // on a line change, so the horizontal glide within a line isn't disturbed.
    // Animate #scrollHost.scrollTop to a target over ~0.35s. We ease by hand on a
    // timer because scrollTo({behavior:"smooth"}) silently no-ops in this WebView (a
    // plain scrollTop assignment jumps), and a timer runs even when rAF is throttled.
    var scrollTimer = null;
    function smoothScrollHostTo(target) {
      var host = document.getElementById("scrollHost"); if (!host) return;
      target = Math.max(0, Math.min(target, host.scrollHeight - host.clientHeight));
      if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
      var start = host.scrollTop, dist = target - start;
      if (Math.abs(dist) < 1) { host.scrollTop = target; return; }
      var dur = 350, t0 = Date.now();
      scrollTimer = setInterval(function () {
        var p = Math.min(1, (Date.now() - t0) / dur);
        var e = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;   // easeInOutQuad
        host.scrollTop = start + dist * e;
        if (p >= 1) { clearInterval(scrollTimer); scrollTimer = null; }
      }, 16);
    }

    var lastScrollTop = -1;
    function followScroll(top) {
      if (top === lastScrollTop) return;
      lastScrollTop = top;
      // Leave headroom above the active system. `top` is the cursor's staff origin,
      // but notes / ledger lines / ornaments sit ABOVE it, so anchoring the origin to
      // the very top clips them. Scale the margin with zoom so it holds at any size.
      var headroom = Math.max(40, 5 * 10 * (osmd.zoom || 1));
      smoothScrollHostTo(top - headroom);
    }

    window.cursorNext = function () {
      try { osmd.cursor.next(); } catch (e) { post("error: cursorNext — " + e); }
    };
    window.cursorReset = function () {
      try {
        osmd.cursor.reset(); osmd.cursor.show();
        lastScrollTop = -1;
        smoothScrollHostTo(0);
      } catch (e) { post("error: cursorReset — " + e); }
    };
    // Advance the cursor by k steps in one call (used by timed playback so we don't
    // pay a JS round-trip per note).
    window.cursorForward = function (k) {
      try { for (var i = 0; i < k; i++) { osmd.cursor.next(); } } catch (e) { post("error: cursorForward — " + e); }
    };
    // Per-hand note colouring. null = default black; else {rh, lh} hex colours.
    // staffIndex 0 = top staff (RH), 1 = bottom staff (LH).
    var handColors = null;
    function applyNoteColors() {
      if (!osmd.graphic || !osmd.graphic.measureList) return;
      var ml = osmd.graphic.measureList;
      for (var m = 0; m < ml.length; m++) {
        var row = ml[m]; if (!row) continue;
        for (var s = 0; s < row.length; s++) {
          var color = handColors ? (s === 0 ? handColors.rh : handColors.lh) : "#000000";
          var gm = row[s]; if (!gm || !gm.staffEntries) continue;
          gm.staffEntries.forEach(function (se) {
            (se.graphicalVoiceEntries || []).forEach(function (gve) {
              (gve.notes || []).forEach(function (n) {
                if (n.sourceNote) { n.sourceNote.NoteheadColor = color; }
              });
            });
          });
        }
      }
    }
    // Re-render (after a colour or layout change), rebuild the cursor anchors, and
    // reset the follow-scroll (the cursor is back at the start after a re-render).
    function recolorAndRerender() {
      applyNoteColors();
      osmd.render();
      buildAnchors();
      if (osmd.cursor) { osmd.cursor.show(); }
      lastScrollTop = -1;   // re-apply follow-scroll on the next cursor tick
      refreshSelection();
    }
    window.setHandColorMode = function (on, rh, lh) {
      handColors = on ? { rh: rh, lh: lh } : null;
      recolorAndRerender();
    };
    // The median bars-per-row of the current layout, and the row count (via measRects).
    function rowStats() {
      var byY = {};
      for (var i = 0; i < measRects.length; i++) {
        var k = Math.round(measRects[i].y);
        byY[k] = (byY[k] || 0) + 1;
      }
      var counts = Object.values(byY);
      if (!counts.length) return { typical: 0, rows: 0 };
      counts.sort(function (a, b) { return a - b; });
      return { typical: counts[Math.floor(counts.length / 2)], rows: counts.length };
    }
    function typicalBarsPerLine() { return rowStats().typical; }

    // ---- Layout fitting ----
    // "Bars per line" is an OSMD MAXIMUM (break after N; width wrapping still
    // applies), so dense music may fit fewer at full size. When N is requested,
    // AUTO-SHRINK the engraving until N actually fit: start at the user's preferred
    // Score size, estimate the needed shrink from the shortfall (got/n), re-render,
    // repeat (converges in 1–2 extra renders), floored at 40% for readability.
    var preferredZoom = 1.0;   // the user's Score size — treated as the preferred/max

    function fitToRequestedBars(keepColors) {
      if (!osmd || !osmd.graphic) return;
      var er = osmd.EngravingRules || osmd.rules;
      var n = er.RenderXMeasuresPerLineAkaSystem || 0;
      var render = keepColors ? recolorAndRerenderKeepingColors : recolorAndRerender;
      osmd.zoom = preferredZoom;
      render();
      if (n <= 0) {
        post("layout: auto · score size " + Math.round(osmd.zoom * 100) + "%");
        return;
      }
      var s = rowStats(), guard = 0;
      while (s.typical < n && s.rows > 1 && osmd.zoom > 0.401 && guard < 4) {
        var factor = Math.max(0.55, s.typical / n) * 0.97;   // shrink estimate + margin
        osmd.zoom = Math.max(0.4, osmd.zoom * factor);
        render();
        s = rowStats();
        guard++;
      }
      post(s.typical >= n || s.rows <= 1
           ? "layout: " + n + " bars/line · score size " + Math.round(osmd.zoom * 100) + "%"
           : "layout: asked " + n + "/line — fits " + s.typical + " even at minimum size");
    }

    // Force a fixed number of measures per line (0 = automatic), auto-shrinking the
    // score so the request is actually honoured.
    window.setMeasuresPerSystem = function (n) {
      var er = osmd.EngravingRules || osmd.rules;
      er.RenderXMeasuresPerLineAkaSystem = n;
      fitToRequestedBars(false);
    };

    // Score size: the preferred engraving scale (the fit never grows past it). All
    // overlays/anchors derive from post-render geometry × osmd.zoom, so they follow.
    window.setZoom = function (z) {
      preferredZoom = z;
      fitToRequestedBars(false);
    };

    // Mistake review: colour specific noteheads red so the player can see what they
    // got wrong. `pairs` is [[beatQuarters, midiPitch], …]. Matched against each
    // note's absolute beat and pitch (OSMD halfTone + 12 = MIDI).
    window.markMistakes = function (pairs) {
      var want = {};
      pairs.forEach(function (p) { want[Math.round(p[0] * 100) + ":" + p[1]] = true; });
      applyNoteColors();   // reset to the baseline (hand colours / black) first
      var ml = osmd.graphic.measureList;
      for (var m = 0; m < ml.length; m++) {
        var row = ml[m]; if (!row) continue;
        for (var s = 0; s < row.length; s++) {
          var gm = row[s]; if (!gm || !gm.staffEntries) continue;
          gm.staffEntries.forEach(function (se) {
            var sse = se.sourceStaffEntry;
            if (!sse || !sse.AbsoluteTimestamp) return;
            var key0 = Math.round(sse.AbsoluteTimestamp.RealValue * 4 * 100);
            (se.graphicalVoiceEntries || []).forEach(function (gve) {
              (gve.notes || []).forEach(function (n) {
                var sn = n.sourceNote;
                if (sn && sn.halfTone != null && want[key0 + ":" + (sn.halfTone + 12)]) {
                  sn.NoteheadColor = "#D32F2F";   // red
                }
              });
            });
          });
        }
      }
      recolorAndRerenderKeepingColors();
    };
    // Re-render without resetting note colours (markMistakes already set them).
    function recolorAndRerenderKeepingColors() {
      osmd.render();
      buildAnchors();
      if (osmd.cursor) { osmd.cursor.show(); }
      lastScrollTop = -1;   // re-apply follow-scroll on the next cursor tick
      refreshSelection();
    }
    window.clearMistakes = function () { recolorAndRerender(); };

    // Timing tint: colour noteheads by the pass's per-note timing — blue = early
    // (rushing), orange = late (dragging), deeper = further off. Same notehead walk
    // as markMistakes. entries: [[beatQuarters, midiPitch, signedMs], …].
    window.setTimingTint = function (entries) {
      var want = {};
      (entries || []).forEach(function (e) { want[Math.round(e[0] * 100) + ":" + e[1]] = e[2]; });
      applyNoteColors();   // reset to baseline first
      var ml = osmd.graphic.measureList;
      for (var m = 0; m < ml.length; m++) {
        var row = ml[m]; if (!row) continue;
        for (var s = 0; s < row.length; s++) {
          var gm = row[s]; if (!gm || !gm.staffEntries) continue;
          gm.staffEntries.forEach(function (se) {
            var sse = se.sourceStaffEntry;
            if (!sse || !sse.AbsoluteTimestamp) return;
            var key0 = Math.round(sse.AbsoluteTimestamp.RealValue * 4 * 100);
            (se.graphicalVoiceEntries || []).forEach(function (gve) {
              (gve.notes || []).forEach(function (n) {
                var sn = n.sourceNote;
                if (!sn || sn.halfTone == null) return;
                var ms = want[key0 + ":" + (sn.halfTone + 12)];
                if (ms === undefined) return;
                var strong = Math.abs(ms) >= 80;
                sn.NoteheadColor = ms < 0 ? (strong ? "#0D47A1" : "#5E92CC")
                                          : (strong ? "#BF360C" : "#EF9A55");
              });
            });
          });
        }
      }
      recolorAndRerenderKeepingColors();
    };
    window.clearTimingTint = function () { recolorAndRerender(); };

    // --- Section selection (drag bars on the score to set the practice loop) ---
    // A translucent overlay highlights the selected bars without obscuring the notes.
    var measRects = [], selStart = 0, selEnd = 0;   // bars are 1-based; 0 = no selection

    function buildMeasureRects() {
      measRects = [];
      if (!osmd.graphic || !osmd.graphic.measureList) return;
      var ml = osmd.graphic.measureList, f = 10 * osmd.zoom;   // OSMD units → pixels
      for (var m = 0; m < ml.length; m++) {
        var row = ml[m]; if (!row || !row[0]) continue;
        var top = row[0].PositionAndShape, bot = row[row.length - 1].PositionAndShape;
        var x = top.AbsolutePosition.x * f, y = top.AbsolutePosition.y * f;
        var bottom = (bot.AbsolutePosition.y + bot.Size.height) * f;
        measRects.push({ m: m, x: x, y: y, w: top.Size.width * f, h: bottom - y });
      }
    }

    function selOverlay() {
      var cont = document.getElementById("osmdContainer"); if (!cont) return null;
      if (getComputedStyle(cont).position === "static") cont.style.position = "relative";
      var ov = document.getElementById("selOverlay");
      if (!ov) {
        ov = document.createElement("div"); ov.id = "selOverlay";
        ov.style.cssText = "position:absolute;left:0;top:0;pointer-events:none;z-index:1;";
        cont.appendChild(ov);
      }
      return ov;
    }

    function drawSelection() {
      var ov = selOverlay(); if (!ov) return; ov.innerHTML = "";
      if (selStart < 1 || selEnd < 1) return;
      var a = Math.min(selStart, selEnd) - 1, b = Math.max(selStart, selEnd) - 1;
      measRects.forEach(function (r) {
        if (r.m < a || r.m > b) return;
        var d = document.createElement("div");
        d.style.cssText = "position:absolute;left:" + r.x + "px;top:" + r.y + "px;width:" +
          r.w + "px;height:" + r.h + "px;background:rgba(21,101,192,0.13);" +
          "border:1px solid rgba(21,101,192,0.45);border-radius:3px;";
        ov.appendChild(d);
      });
    }

    window.setSelection = function (startBar, endBar) { selStart = startBar; selEnd = endBar; drawSelection(); };
    window.clearSelection = function () { selStart = 0; selEnd = 0; drawSelection(); };

    // --- Trouble spots: amber-tint whole bars you still keep missing. Sits BELOW the
    // blue section selection (z 0 vs 1) and is translucent so the notes read through.
    var troubleBars = [];
    function troubleOverlay() {
      var cont = document.getElementById("osmdContainer"); if (!cont) return null;
      if (getComputedStyle(cont).position === "static") cont.style.position = "relative";
      var ov = document.getElementById("troubleOverlay");
      if (!ov) {
        ov = document.createElement("div"); ov.id = "troubleOverlay";
        ov.style.cssText = "position:absolute;left:0;top:0;pointer-events:none;z-index:0;";
        cont.insertBefore(ov, cont.firstChild);
      }
      return ov;
    }
    function drawTrouble() {
      var ov = troubleOverlay(); if (!ov) return; ov.innerHTML = "";
      troubleBars.forEach(function (bar) {
        var r = null;
        for (var i = 0; i < measRects.length; i++) { if (measRects[i].m === bar - 1) { r = measRects[i]; break; } }
        if (!r) return;
        var d = document.createElement("div");
        d.style.cssText = "position:absolute;left:" + r.x + "px;top:" + r.y + "px;width:" +
          r.w + "px;height:" + r.h + "px;background:rgba(245,158,11,0.16);" +
          "border:1px solid rgba(245,158,11,0.55);border-radius:3px;";
        ov.appendChild(d);
      });
    }
    window.setTroubleBars = function (bars) { troubleBars = bars || []; drawTrouble(); };
    window.clearTroubleBars = function () { troubleBars = []; drawTrouble(); };

    // --- Manual revisit flags: a small tappable ⚑ at the top-left of each flagged bar.
    // The markers are clickable (pointer-events:auto) while the rest of the layer isn't,
    // so they don't block drag-select. Tapping one posts flag:<bar> back to Swift.
    var flaggedBars = [];
    function flagOverlay() {
      var cont = document.getElementById("osmdContainer"); if (!cont) return null;
      if (getComputedStyle(cont).position === "static") cont.style.position = "relative";
      var ov = document.getElementById("flagOverlay");
      if (!ov) {
        ov = document.createElement("div"); ov.id = "flagOverlay";
        ov.style.cssText = "position:absolute;left:0;top:0;pointer-events:none;z-index:3;";
        cont.appendChild(ov);
      }
      return ov;
    }
    function drawFlags() {
      var ov = flagOverlay(); if (!ov) return; ov.innerHTML = "";
      flaggedBars.forEach(function (bar) {
        var r = null;
        for (var i = 0; i < measRects.length; i++) { if (measRects[i].m === bar - 1) { r = measRects[i]; break; } }
        if (!r) return;
        var d = document.createElement("div");
        d.title = "Flag — bar " + bar + " (tap to edit)";
        d.style.cssText = "position:absolute;pointer-events:auto;cursor:pointer;left:" + (r.x + 1) + "px;top:" +
          (r.y + 1) + "px;width:16px;height:16px;font-size:15px;line-height:16px;text-align:center;color:#8e44ad;";
        d.textContent = "⚑";   // ⚑
        d.onmousedown = function (e) { e.stopPropagation(); };   // don't start a drag-select
        d.onclick = function (e) { e.stopPropagation(); post("flag:" + bar); };
        ov.appendChild(d);
      });
    }
    window.setFlaggedBars = function (bars) { flaggedBars = bars || []; drawFlags(); };

    // Which bar is at a point. `strict` returns -1 unless the point is actually inside
    // a measure's box (used to decide select-vs-deselect on a click); non-strict falls
    // back to the nearest bar in the row (used while dragging, so it's forgiving).
    function measureAt(clientX, clientY, strict) {
      var cont = document.getElementById("osmdContainer"); if (!cont) return -1;
      var rr = cont.getBoundingClientRect();
      var px = clientX - rr.left, py = clientY - rr.top;
      var row = measRects.filter(function (r) { return py >= r.y && py <= r.y + r.h; });
      if (!row.length) return -1;
      for (var i = 0; i < row.length; i++) if (px >= row[i].x && px <= row[i].x + row[i].w) return row[i].m;
      if (strict) return -1;   // clicked between/around bars → not a bar hit
      var best = -1, bd = 1e9;
      row.forEach(function (r) { var d = Math.abs(px - (r.x + r.w / 2)); if (d < bd) { bd = d; best = r.m; } });
      return best;
    }

    (function () {
      var dragging = false, anchor = -1, lastX = 0, lastY = 0, edgeTimer = null;

      // Auto-scroll while dragging a selection past the top/bottom edge, so you can
      // select bars that aren't on screen yet. Holding the pointer in the edge zone
      // scrolls the score and keeps extending the selection to the newly-revealed bars.
      function edgeScrollTick() {
        if (!dragging) { stopEdgeScroll(); return; }
        var host = document.getElementById("scrollHost"); if (!host) return;
        var hr = host.getBoundingClientRect(), EDGE = 52, MAX = 20, dy = 0;
        if (lastY < hr.top + EDGE)          dy = -MAX * Math.min(1, (hr.top + EDGE - lastY) / EDGE);
        else if (lastY > hr.bottom - EDGE)  dy =  MAX * Math.min(1, (lastY - (hr.bottom - EDGE)) / EDGE);
        if (dy === 0) return;
        var max = host.scrollHeight - host.clientHeight;
        var nt = Math.max(0, Math.min(max, host.scrollTop + dy));
        if (nt !== host.scrollTop) { host.scrollTop = nt; moveDrag(lastX, lastY); }
      }
      function startEdgeScroll() { if (!edgeTimer) edgeTimer = setInterval(edgeScrollTick, 30); }
      function stopEdgeScroll() { if (edgeTimer) { clearInterval(edgeTimer); edgeTimer = null; } }

      function beginDrag(x, y) {
        var m = measureAt(x, y, true); if (m < 0) return false;   // strict: only start on a real bar
        dragging = true; anchor = m; selStart = m + 1; selEnd = m + 1; lastX = x; lastY = y;
        drawSelection(); startEdgeScroll();
        return true;
      }
      function moveDrag(x, y) {
        if (!dragging) return;
        lastX = x; lastY = y;
        var m = measureAt(x, y); if (m < 0) return;
        selStart = Math.min(anchor, m) + 1; selEnd = Math.max(anchor, m) + 1; drawSelection();
      }
      function endDrag() {
        if (!dragging) return; dragging = false; stopEdgeScroll();
        post("select:" + selStart + ":" + selEnd);
      }
      function onMove(e) { moveDrag(e.clientX, e.clientY); }
      function onUp() {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        endDrag();
      }
      // Escape clears the selection (once, document-level).
      if (!window._escAttached) {
        window._escAttached = true;
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && selStart) post("deselect");
        });
      }
      window._attachSelection = function () {
        var cont = document.getElementById("osmdContainer");
        if (!cont || cont._selAttached) return;
        cont._selAttached = true;
        // Mouse (Mac / trackpad)
        cont.addEventListener("mousedown", function (e) {
          if (!beginDrag(e.clientX, e.clientY)) {
            if (selStart) post("deselect");   // clicked in whitespace (no bar) → clear selection
            return;
          }
          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
          e.preventDefault();
        });
        // Touch (iPad) — the selection was mouse-event-only, so drag-to-select
        // simply didn't exist on touch. Long-drag horizontally selects; a plain
        // vertical swipe still scrolls (we only claim the gesture once it starts
        // on a bar and moves mostly horizontally).
        var touchStart = null;
        cont.addEventListener("touchstart", function (e) {
          if (e.touches.length !== 1) return;
          var t = e.touches[0];
          touchStart = { x: t.clientX, y: t.clientY, claimed: false };
        }, { passive: true });
        cont.addEventListener("touchmove", function (e) {
          if (!touchStart || e.touches.length !== 1) return;
          var t = e.touches[0];
          if (!touchStart.claimed) {
            var dx = Math.abs(t.clientX - touchStart.x), dy = Math.abs(t.clientY - touchStart.y);
            if (dx < 12 && dy < 12) return;              // not yet a deliberate drag
            if (dy > dx) { touchStart = null; return; }  // vertical → let it scroll
            if (!beginDrag(touchStart.x, touchStart.y)) { touchStart = null; return; }
            touchStart.claimed = true;
          }
          moveDrag(t.clientX, t.clientY);
          e.preventDefault();                            // claimed: stop the scroll
        }, { passive: false });
        cont.addEventListener("touchend", function () {
          if (touchStart && touchStart.claimed) { endDrag(); }
          touchStart = null;
        });
      };
    })();

    // Rebuild rects + reattach + redraw overlays after any (re)render.
    function refreshSelection() { buildMeasureRects(); window._attachSelection(); drawSelection(); drawMissed(); drawWrong(); drawTrouble(); drawFlags(); }

    // --- Missed-note markers (cheap overlay, updated every practice pass; no re-render) ---
    var missedPairs = [];   // [[beat, midi], …]
    function missedOverlay() {
      var cont = document.getElementById("osmdContainer"); if (!cont) return null;
      if (getComputedStyle(cont).position === "static") cont.style.position = "relative";
      var ov = document.getElementById("missedOverlay");
      if (!ov) {
        ov = document.createElement("div"); ov.id = "missedOverlay";
        ov.style.cssText = "position:absolute;left:0;top:0;pointer-events:none;z-index:2;";
        cont.appendChild(ov);
      }
      return ov;
    }
    function drawMissed() {
      var ov = missedOverlay(); if (!ov) return; ov.innerHTML = "";
      if (!missedPairs.length || !osmd.graphic) return;
      var want = {};
      missedPairs.forEach(function (p) { want[Math.round(p[0] * 100) + ":" + p[1]] = true; });
      var ml = osmd.graphic.measureList, f = 10 * osmd.zoom;
      for (var m = 0; m < ml.length; m++) {
        var row = ml[m]; if (!row) continue;
        for (var s = 0; s < row.length; s++) {
          var gm = row[s]; if (!gm || !gm.staffEntries) continue;
          gm.staffEntries.forEach(function (se) {
            var sse = se.sourceStaffEntry; if (!sse || !sse.AbsoluteTimestamp) return;
            var key0 = Math.round(sse.AbsoluteTimestamp.RealValue * 4 * 100);
            (se.graphicalVoiceEntries || []).forEach(function (gve) {
              (gve.notes || []).forEach(function (n) {
                var sn = n.sourceNote; if (!sn || sn.halfTone == null) return;
                if (!want[key0 + ":" + (sn.halfTone + 12)]) return;
                var ps = n.PositionAndShape; if (!ps) return;
                var x = ps.AbsolutePosition.x * f, y = ps.AbsolutePosition.y * f;
                var d = document.createElement("div");
                d.style.cssText = "position:absolute;left:" + (x - 9) + "px;top:" + (y - 9) +
                  "px;width:18px;height:18px;border:2px solid rgba(211,47,47,0.9);border-radius:50%;";
                ov.appendChild(d);
              });
            });
          });
        }
      }
    }
    window.markMissed = function (pairs) { missedPairs = pairs || []; drawMissed(); };
    window.clearMissed = function () { missedPairs = []; drawMissed(); };

    // ---- Wrong notes you played (no matching notehead, so we place a marker) ----
    var wrongPairs = [];   // [[beat, midi], …]
    var NAMES = ["C","C♯","D","D♯","E","F","F♯","G","G♯","A","A♯","B"];
    var DIATONIC = [0,0,1,1,2,3,3,4,4,5,5,6];   // pitch-class → diatonic step (C=0…B=6)
    function midiToName(p) { return NAMES[((p % 12) + 12) % 12] + (Math.floor(p / 12) - 1); }
    function midiToDiatonic(p) { var pc = ((p % 12) + 12) % 12; return (Math.floor(p / 12) - 1) * 7 + DIATONIC[pc]; }

    function drawWrong() {
      var ov = wrongOverlay(); if (!ov) return; ov.innerHTML = "";
      if (!wrongPairs.length || !osmd.graphic) return;
      var ml = osmd.graphic.measureList, f = 10 * osmd.zoom;
      // Collect every notehead as a placement reference: its beat, pixel x/y, and its
      // diatonic staff-step derived from MIDI (halfTone+12) so it shares one basis with
      // the wrong note. y is linear in diatonic step, so we offset from the nearest
      // reference by the step difference.
      var refs = [];
      for (var m = 0; m < ml.length; m++) {
        var row = ml[m]; if (!row) continue;
        for (var s = 0; s < row.length; s++) {
          var gm = row[s]; if (!gm || !gm.staffEntries) continue;
          gm.staffEntries.forEach(function (se) {
            var sse = se.sourceStaffEntry; if (!sse || !sse.AbsoluteTimestamp) return;
            var beat = sse.AbsoluteTimestamp.RealValue * 4;
            (se.graphicalVoiceEntries || []).forEach(function (gve) {
              (gve.notes || []).forEach(function (n) {
                var sn = n.sourceNote, ps = n.PositionAndShape;
                if (!sn || sn.halfTone == null || !ps) return;
                refs.push({ beat: beat, x: ps.AbsolutePosition.x * f, y: ps.AbsolutePosition.y * f,
                            dia: midiToDiatonic(sn.halfTone + 12) });
              });
            });
          });
        }
      }
      if (!refs.length) return;
      var stepPx = 0.5 * f;   // one diatonic step ≈ half a staff space
      wrongPairs.forEach(function (p) {
        var beat = p[0], wantDia = midiToDiatonic(p[1]);
        // Nearest notehead in time; among near-ties, the one closest in pitch (which
        // also selects the correct staff, treble vs bass).
        var best = null, bestScore = 1e9;
        for (var i = 0; i < refs.length; i++) {
          var r = refs[i], score = Math.abs(r.beat - beat) * 20 + Math.abs(r.dia - wantDia);
          if (score < bestScore) { bestScore = score; best = r; }
        }
        if (!best) return;
        var x = best.x, y = best.y - (wantDia - best.dia) * stepPx;
        var d = document.createElement("div");
        d.style.cssText = "position:absolute;left:" + (x - 6) + "px;top:" + (y - 6) +
          "px;width:12px;height:12px;background:rgba(211,47,47,0.85);border-radius:50%;" +
          "box-shadow:0 0 0 1.5px #fff;";
        var lbl = document.createElement("div");
        lbl.textContent = midiToName(p[1]);
        lbl.style.cssText = "position:absolute;left:" + (x + 8) + "px;top:" + (y - 8) +
          "px;font:600 11px system-ui;color:rgba(211,47,47,0.95);white-space:nowrap;";
        ov.appendChild(d); ov.appendChild(lbl);
      });
    }
    function wrongOverlay() {
      var cont = document.getElementById("osmdContainer"); if (!cont) return null;
      if (getComputedStyle(cont).position === "static") cont.style.position = "relative";
      var ov = document.getElementById("wrongOverlay");
      if (!ov) {
        ov = document.createElement("div"); ov.id = "wrongOverlay";
        ov.style.cssText = "position:absolute;left:0;top:0;pointer-events:none;z-index:3;";
        cont.appendChild(ov);
      }
      return ov;
    }
    window.markWrong = function (pairs) { wrongPairs = pairs || []; drawWrong(); };

    // Move the cursor to a notated beat position (quarter beats from the start).
    // Steps forward using OSMD's own timestamps, so it self-corrects and is robust
    // to swing, rubato, and rest-only stops. qTarget is in quarter-note beats.
    window.cursorToBeat = function (qTarget) {
      try {
        var it = osmd.cursor.iterator, guard = 0;
        while (!it.endReached && guard < 100000) {
          if (it.currentTimeStamp.RealValue * 4 >= qTarget - 0.001) break;
          osmd.cursor.next(); guard++;
        }
      } catch (e) { post("error: cursorToBeat — " + e); }
    };

    post("ready");
  </script>
</body>
</html>
