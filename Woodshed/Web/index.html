<!DOCTYPE html>
<!--
  index.html — the offline notation surface.

  This page is loaded into a WKWebView from the app bundle (no network). It hosts
  OpenSheetMusicDisplay (the vendored opensheetmusicdisplay.min.js sitting next to
  this file) and exposes a tiny JS API that Swift calls via evaluateJavaScript:

      window.loadScoreB64(base64Xml)  -> render a score
      window.cursorNext()             -> advance the follow-cursor
      window.cursorReset()            -> move the cursor back to the start

  Swift owns the data model and the clock; this page only draws and moves a cursor.
  Status/errors are posted back to Swift through the "osmd" message handler.
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body { margin: 0; padding: 0; background: #ffffff; }
    #osmdContainer { width: 100%; }
    #err { color: #b00; font-family: -apple-system, monospace; padding: 12px; white-space: pre-wrap; }
  </style>
  <script src="opensheetmusicdisplay.min.js"></script>
</head>
<body>
  <div id="err"></div>
  <div id="osmdContainer"></div>
  <script>
    function post(msg) {
      try { window.webkit.messageHandlers.osmd.postMessage(msg); } catch (e) {}
    }

    var osmd = null;
    if (typeof opensheetmusicdisplay === "undefined") {
      post("error: OSMD script not loaded");
    } else {
      try {
        osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay("osmdContainer", {
          autoResize: true,
          backend: "svg",
          drawTitle: true,
          drawingParameters: "default"
        });
      } catch (e) {
        post("error: OSMD init failed — " + e);
      }
    }

    // Decode a base64 (UTF-8) payload into a JS string. atob() yields a binary
    // string (one byte per char); the escape/decodeURIComponent dance turns those
    // bytes back into proper UTF-8 text so accented titles etc. survive.
    function b64ToUtf8(b64) {
      return decodeURIComponent(escape(window.atob(b64)));
    }

    var pendingRender = false;

    // Render only when the container actually has width. In a WKWebView the view
    // can start at 0×0 and get its real size a beat later; rendering at width 0
    // produces an invisible score (the "white box"). So if width is 0 we wait for
    // a ResizeObserver to report a real width, then render exactly once.
    function renderWhenSized() {
      var c = document.getElementById("osmdContainer");
      if (c.clientWidth > 0) {
        osmd.render();
        if (osmd.cursor) { osmd.cursor.show(); }
        pendingRender = false;
        post("loaded svg=" + c.querySelectorAll("svg").length + " containerW=" + c.clientWidth);
      } else {
        pendingRender = true;
        post("waiting for width (containerW=0)…");
      }
    }

    var ro = new ResizeObserver(function () {
      if (pendingRender) { renderWhenSized(); }
    });
    ro.observe(document.getElementById("osmdContainer"));

    window.loadScoreB64 = function (b64) {
      document.getElementById("err").textContent = "";
      post("received b64len=" + (b64 ? b64.length : 0));
      if (!osmd) { post("error: OSMD not initialized"); return; }
      var xml;
      try { xml = b64ToUtf8(b64); }
      catch (e) { post("error: base64 decode failed"); return; }
      post("decoded xmlChars=" + xml.length);
      osmd.load(xml).then(function () {
        renderWhenSized();
      }).catch(function (e) {
        document.getElementById("err").textContent = "OSMD error: " + e;
        post("error: load — " + e);
      });
    };

    window.cursorNext = function () {
      try { osmd.cursor.next(); } catch (e) {}
    };
    window.cursorReset = function () {
      try { osmd.cursor.reset(); osmd.cursor.show(); } catch (e) {}
    };
    // Advance the cursor by k steps in one call (used by timed playback so we don't
    // pay a JS round-trip per note).
    window.cursorForward = function (k) {
      try { for (var i = 0; i < k; i++) { osmd.cursor.next(); } } catch (e) {}
    };
    // Move the cursor to a notated beat position (quarter beats from the start).
    // Steps forward using OSMD's own timestamps, so it self-corrects and is robust
    // to swing, rubato, and rest-only stops. qTarget is in quarter-note beats.
    window.cursorToBeat = function (qTarget) {
      try {
        var it = osmd.cursor.iterator, guard = 0;
        while (!it.endReached && guard < 100000) {
          if (it.currentTimeStamp.RealValue * 4 >= qTarget - 0.001) break;
          osmd.cursor.next(); guard++;
        }
      } catch (e) {}
    };

    post("ready");
  </script>
</body>
</html>
