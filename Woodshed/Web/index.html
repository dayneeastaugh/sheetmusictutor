<!DOCTYPE html>
<!--
  index.html — the offline notation surface.

  This page is loaded into a WKWebView from the app bundle (no network). It hosts
  OpenSheetMusicDisplay (the vendored opensheetmusicdisplay.min.js sitting next to
  this file) and exposes a tiny JS API that Swift calls via evaluateJavaScript:

      window.loadScoreB64(base64Xml)  -> render a score
      window.cursorNext()             -> advance the follow-cursor
      window.cursorReset()            -> move the cursor back to the start

  Swift owns the data model and the clock; this page only draws and moves a cursor.
  Status/errors are posted back to Swift through the "osmd" message handler.
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body { margin: 0; padding: 0; background: #ffffff; }
    #osmdContainer { width: 100%; }
    #err { color: #b00; font-family: -apple-system, monospace; padding: 12px; white-space: pre-wrap; }
  </style>
  <script src="opensheetmusicdisplay.min.js"></script>
</head>
<body>
  <div id="err"></div>
  <div id="osmdContainer"></div>
  <script>
    function post(msg) {
      try { window.webkit.messageHandlers.osmd.postMessage(msg); } catch (e) {}
    }

    var osmd = null;
    if (typeof opensheetmusicdisplay === "undefined") {
      post("error: OSMD script not loaded");
    } else {
      try {
        osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay("osmdContainer", {
          autoResize: true,
          backend: "svg",
          drawTitle: true,
          drawingParameters: "default"
        });
      } catch (e) {
        post("error: OSMD init failed — " + e);
      }
    }

    // Decode a base64 (UTF-8) payload into a JS string. atob() yields a binary
    // string (one byte per char); the escape/decodeURIComponent dance turns those
    // bytes back into proper UTF-8 text so accented titles etc. survive.
    function b64ToUtf8(b64) {
      return decodeURIComponent(escape(window.atob(b64)));
    }

    var pendingRender = false;

    // Render only when the container actually has width. In a WKWebView the view
    // can start at 0×0 and get its real size a beat later; rendering at width 0
    // produces an invisible score (the "white box"). So if width is 0 we wait for
    // a ResizeObserver to report a real width, then render exactly once.
    function renderWhenSized() {
      var c = document.getElementById("osmdContainer");
      if (c.clientWidth > 0) {
        osmd.render();
        if (osmd.cursor) { osmd.cursor.show(); }
        buildAnchors();
        if (handColors) { recolorAndRerender(); }   // reapply hand colours after a fresh load
        pendingRender = false;
        post("loaded svg=" + c.querySelectorAll("svg").length + " containerW=" + c.clientWidth);
      } else {
        pendingRender = true;
        post("waiting for width (containerW=0)…");
      }
    }

    var ro = new ResizeObserver(function () {
      if (pendingRender) { renderWhenSized(); }
    });
    ro.observe(document.getElementById("osmdContainer"));

    window.loadScoreB64 = function (b64) {
      document.getElementById("err").textContent = "";
      post("received b64len=" + (b64 ? b64.length : 0));
      if (!osmd) { post("error: OSMD not initialized"); return; }
      var xml;
      try { xml = b64ToUtf8(b64); }
      catch (e) { post("error: base64 decode failed"); return; }
      post("decoded xmlChars=" + xml.length);
      osmd.load(xml).then(function () {
        renderWhenSized();
      }).catch(function (e) {
        document.getElementById("err").textContent = "OSMD error: " + e;
        post("error: load — " + e);
      });
    };

    // Anchor table: for every cursor stop, its notated beat and pixel position.
    // Built once per render; used to interpolate a smooth cursor between notes.
    var anchors = [];
    function buildAnchors() {
      var el = osmd.cursor && osmd.cursor.cursorElement;
      if (!el) return;
      osmd.cursor.reset();
      anchors = [];
      var guard = 0;
      while (!osmd.cursor.iterator.endReached && guard < 100000) {
        anchors.push({ b: osmd.cursor.iterator.currentTimeStamp.RealValue * 4,
                       left: el.offsetLeft, top: el.offsetTop });
        osmd.cursor.next(); guard++;
      }
      osmd.cursor.reset();
      osmd.cursor.show();
    }

    // Position the cursor at a (possibly fractional) notated beat. Interpolates the
    // horizontal position within a system for fluid motion; snaps across line breaks
    // (where the stop's vertical position changes).
    window.cursorSeekBeat = function (cb) {
      var A = anchors, el = osmd.cursor && osmd.cursor.cursorElement;
      if (!A.length || !el) return;
      var i = 0;
      while (i + 1 < A.length && A[i + 1].b <= cb) i++;
      var x = A[i].left, top = A[i].top;
      if (i + 1 < A.length && A[i + 1].top === A[i].top) {
        var span = A[i + 1].b - A[i].b;
        var f = span > 0 ? (cb - A[i].b) / span : 0;
        if (f < 0) f = 0; else if (f > 1) f = 1;
        x = A[i].left + f * (A[i + 1].left - A[i].left);
      }
      el.style.left = x + "px";
      el.style.top = top + "px";
      followScroll(top);
    };

    // Follow-scroll: keep the active system near the top so the current line and the
    // next line stay in view. We translate the notation up with a CSS transform
    // (not window.scrollTo) because the WKWebView isn't internally scrollable — a
    // transform works whether or not the host view scrolls. Only updates on a line
    // change, so the horizontal glide within a line isn't disturbed; the shift is
    // animated for smoothness.
    var lastScrollTop = -1;
    function followScroll(top) {
      if (top === lastScrollTop) return;
      lastScrollTop = top;
      var c = document.getElementById("osmdContainer");
      c.style.transition = "transform 0.35s ease";
      c.style.transform = "translateY(" + (-Math.max(0, top - 20)) + "px)";
    }

    window.cursorNext = function () {
      try { osmd.cursor.next(); } catch (e) {}
    };
    window.cursorReset = function () {
      try {
        osmd.cursor.reset(); osmd.cursor.show();
        lastScrollTop = -1;
        var c = document.getElementById("osmdContainer");
        c.style.transition = "transform 0.35s ease";
        c.style.transform = "translateY(0px)";
      } catch (e) {}
    };
    // Advance the cursor by k steps in one call (used by timed playback so we don't
    // pay a JS round-trip per note).
    window.cursorForward = function (k) {
      try { for (var i = 0; i < k; i++) { osmd.cursor.next(); } } catch (e) {}
    };
    // Per-hand note colouring. null = default black; else {rh, lh} hex colours.
    // staffIndex 0 = top staff (RH), 1 = bottom staff (LH).
    var handColors = null;
    function applyNoteColors() {
      if (!osmd.graphic || !osmd.graphic.measureList) return;
      var ml = osmd.graphic.measureList;
      for (var m = 0; m < ml.length; m++) {
        var row = ml[m]; if (!row) continue;
        for (var s = 0; s < row.length; s++) {
          var color = handColors ? (s === 0 ? handColors.rh : handColors.lh) : "#000000";
          var gm = row[s]; if (!gm || !gm.staffEntries) continue;
          gm.staffEntries.forEach(function (se) {
            (se.graphicalVoiceEntries || []).forEach(function (gve) {
              (gve.notes || []).forEach(function (n) {
                if (n.sourceNote) { n.sourceNote.NoteheadColor = color; }
              });
            });
          });
        }
      }
    }
    // Re-render with the colours applied, then rebuild the cursor anchors.
    function recolorAndRerender() {
      applyNoteColors();
      osmd.render();
      buildAnchors();
      if (osmd.cursor) { osmd.cursor.show(); }
    }
    window.setHandColorMode = function (on, rh, lh) {
      handColors = on ? { rh: rh, lh: lh } : null;
      recolorAndRerender();
    };

    // Move the cursor to a notated beat position (quarter beats from the start).
    // Steps forward using OSMD's own timestamps, so it self-corrects and is robust
    // to swing, rubato, and rest-only stops. qTarget is in quarter-note beats.
    window.cursorToBeat = function (qTarget) {
      try {
        var it = osmd.cursor.iterator, guard = 0;
        while (!it.endReached && guard < 100000) {
          if (it.currentTimeStamp.RealValue * 4 >= qTarget - 0.001) break;
          osmd.cursor.next(); guard++;
        }
      } catch (e) {}
    };

    post("ready");
  </script>
</body>
</html>
